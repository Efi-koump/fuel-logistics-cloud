apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-source
  namespace: default
data:
  app.py: |
    # frontend/app.py
    from flask import Flask, render_template_string, send_file, jsonify
    from minio import Minio
    import io
    import json
    import os

    app = Flask(__name__)

    MINIO_ENDPOINT = os.getenv("MINIO_ENDPOINT", "minio:9000")
    MINIO_ACCESS_KEY = os.getenv("MINIO_ACCESS_KEY", "minioadmin")
    MINIO_SECRET_KEY = os.getenv("MINIO_SECRET_KEY", "minioadmin")

    minio_client = Minio(
        MINIO_ENDPOINT,
        access_key=MINIO_ACCESS_KEY,
        secret_key=MINIO_SECRET_KEY,
        secure=False
    )

    HTML_TEMPLATE = """
    <!DOCTYPE html>
    <html lang="el">
    <head>
        <meta charset="UTF-8">
        <title>Fuel Logistics - Safety Monitor UI</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <style>
            .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1055; }
        </style>
    </head>
    <body class="bg-light">
        <div class="toast-container" id="toastContainer"></div>

        <div class="container mt-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h2 text-warning">⛽ Fuel Logistics & Safety Monitor Dashboard</h1>
                <span class="badge bg-danger fs-6 animate-pulse">Kubernetes Live Mode</span>
            </div>
            
            <div class="card bg-secondary text-light shadow">
                <div class="card-body">
                    <h5 class="card-title text-info">Ενεργοί Συναγερμοί (Alarms) ανά Tenant</h5>
                    <div class="table-responsive">
                        <table class="table table-dark table-striped table-hover mt-3 align-middle">
                            <thead>
                                <tr>
                                    <th>Σταθμός (Bucket)</th>
                                    <th>Όνομα Αρχείου</th>
                                    <th>Συσκευή (Device ID)</th>
                                    <th>Τύπος Συναγερμού</th>
                                    <th>Ενέργεια</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for alarm in alarms %}
                                <tr>
                                    <td><span class="badge bg-primary">{{ alarm.bucket }}</span></td>
                                    <td class="text-muted" style="font-size: 0.85rem;">{{ alarm.object_name }}</td>
                                    <td class="fw-bold text-light">{{ alarm.device }}</td>
                                    <td><span class="text-warning fw-bold">{{ alarm.type }}</span></td>
                                    <td>
                                        <a href="/download/{{ alarm.bucket }}/{{ alarm.object_name }}" class="btn btn-sm btn-outline-info">
                                            📥 Download JSON
                                        </a>
                                    </td>
                                </tr>
                                {% else %}
                                <tr>
                                    <td colspan="5" class="text-center text-muted">Δεν βρέθηκαν ενεργοί συναγερμοί στα Buckets.</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script>
            let currentAlarmCount = {{ alarms|length }};
            
            function checkNewAlarms() {
                fetch('/api/alarm-count')
                    .then(response => response.json())
                    .then(data => {
                        if (data.count > currentAlarmCount) {
                            showNotification("🚨 Νέος Κρίσιμος Συναγερμός!", "Λήφθηκε νέο alarm στα multi-tenancy buckets. Κάντε ανανέωση για προβολή.");
                            currentAlarmCount = data.count;
                        }
                    });
            }

            function showNotification(title, message) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = 'toast show bg-danger text-white border-0 mb-2';
                toast.innerHTML = `
                    <div class="toast-header bg-dark text-white justify-content-between">
                        <strong class="me-auto">${title}</strong>
                        <button type="button" class="btn-close btn-close-white" onclick="this.parentElement.parentElement.remove()"></button>
                    </div>
                    <div class="toast-body">${message} <button class="btn btn-sm btn-light ms-2" onclick="location.reload()">Ανανέωση</button></div>
                `;
                container.appendChild(toast);
            }

            // Έλεγχος για νέα alarms κάθε 5 δευτερόλεπτα
            setInterval(checkNewAlarms, 5000);
        </script>
    </body>
    </html>
    """

    def get_all_alarms_list():
        all_alarms = []
        buckets = ["gas-station-01", "gas-station-02", "gas-station-03"]
        for bucket in buckets:
            if minio_client.bucket_exists(bucket):
                objects = minio_client.list_objects(bucket)
                for obj in objects:
                    try:
                        response = minio_client.get_object(bucket, obj.object_name)
                        data = json.loads(response.data.decode('utf-8'))
                        device_id = data.get("device_id", "Unknown")
                        alarm_type = data.get("alarm_type", "General Alarm")
                        all_alarms.append({
                            "bucket": bucket,
                            "object_name": obj.object_name,
                            "device": device_id,
                            "type": alarm_type
                        })
                    except:
                        pass
        return all_alarms

    @app.route('/')
    def index():
        return render_template_string(HTML_TEMPLATE, alarms=get_all_alarms_list())

    # Endpoint για λήψη (Download) ολόκληρου του αρχείου JSON από το MinIO
    @app.route('/download/<bucket>/<object_name>')
    def download_file(bucket, object_name):
        try:
            response = minio_client.get_object(bucket, object_name)
            file_data = response.data
            return send_file(
                io.BytesIO(file_data),
                mimetype='application/json',
                as_attachment=True,
                download_name=object_name
            )
        except Exception as e:
            return f"Σφάλμα κατά το download: {e}", 500

    # API Endpoint για να ελέγχει η JavaScript live τον αριθμό των αρχείων
    @app.route('/api/alarm-count')
    def alarm_count():
        return jsonify({"count": len(get_all_alarms_list())})

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=5000)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-app
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
      containers:
      - name: frontend
        image: python:3.10-slim
        command: ["/bin/sh", "-c"]
        args:
        - "pip install flask minio && python /app/app.py"
        ports:
        - containerPort: 5000
        env:
        - name: MINIO_ENDPOINT
          value: "minio:9000"
        volumeMounts:
        - name: app-volume
          mountPath: /app
      volumes:
      - name: app-volume
        configMap:
          name: frontend-source
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: frontend-app
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30500