apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-red
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-red
  template:
    metadata:
      labels:
        app: node-red
    spec:
      containers:
      - name: node-red
        image: nodered/node-red:latest    
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 1880
          name: ui
        env:
        - name: TZ
          value: "Europe/Athens"
---
apiVersion: v1
kind: Service
metadata:
  name: node-red
  namespace: default
spec:
  selector:
    app: node-red
  ports:
  - name: ui
    port: 1888
    targetPort: 1880
  type: LoadBalancer            