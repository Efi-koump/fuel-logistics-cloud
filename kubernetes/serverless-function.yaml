apiVersion: apps/v1
kind: Deployment
metadata:
  name: alarm-processor-serverless
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alarm-processor
  template:
    metadata:
      labels:
        app: alarm-processor
    spec:
      containers:
      - name: processor
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args:
        - |
          pip install flask
          
          cat << 'EOF' > app.py
          from flask import Flask, request, jsonify
          app = Flask(__name__)

          @app.route('/', methods=['POST'])
          def process_event():
              print("🚀 Serverless Function Triggered successfully by MinIO!")
              return jsonify({"status": "success", "message": "Alarm processed"}), 200

          if __name__ == '__main__':
              app.run(host='0.0.0.0', port=8080)
          EOF
          
          python app.py
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "200m"      # Πολύ χαμηλή κατανάλωση, όπως οι serverless συναρτήσεις!
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: alarm-processor-service
  namespace: default
spec:
  selector:
    app: alarm-processor
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: ClusterIP