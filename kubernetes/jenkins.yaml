apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      containers:
      - name: jenkins
        image: jenkins/jenkins:lts        # Η επίσημη, εγγυημένη εικόνα του Jenkins
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: "500m"
            memory: 500Mi
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins-web
  namespace: jenkins
spec:
  selector:
    app: jenkins
  ports:
  - name: http
    port: 8085         # Η μόνιμη θύρα σου στα Windows!
    targetPort: 8080
  type: LoadBalancer