version: '3.8'

services:

  # ThingsBoard IoT platform
  mytb:
    restart: always
    image: thingsboard/tb-postgres:3.8.1
    depends_on:       # Προστέθηκε για να περιμένει το RabbitMQ
      - rabbitmq
    ports:
      - "8080:9090"
      - "1883:1883"
      - "7070:7070"
      - "5683-5688:5683-5688/udp"
    environment:
      TB_QUEUE_TYPE: rabbitmq
      TB_QUEUE_RABBIT_MQ_USERNAME: ais25108
      TB_QUEUE_RABBIT_MQ_PASSWORD: ais25108
      TB_QUEUE_RABBIT_MQ_HOST: rabbitmq
      TB_QUEUE_RABBIT_MQ_PORT: 5672
    volumes:
      - mytb-data:/data
      - mytb-logs:/var/log/thingsboard

  # Node-RED 
  node-red:
    # image: nodered/node-red:latest
    build:
      context: ./node-red
      dockerfile: Dockerfile
    container_name: node-red
    restart: always
    user: "node-red"
    environment:
      - TZ=Europe/Athens
    ports:
      - "1880:1880" # Node-RED UI/Editor
    depends_on:
      - rabbitmq
      - minio
    volumes:
      - ./node-red/data:/data # Persist flows, settings, and nodes

  # RabbitMQ (Message Broker)
  rabbitmq:
    image: rabbitmq:3.12-management # Includes management plugin for UI
    container_name: rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=ais25108
      - RABBITMQ_DEFAULT_PASS=ais25108
    ports:
      - "5672:5672" # Standard AMQP port
      - "15672:15672" # Management UI port
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq # Persist queue and broker data

  # MinIO 
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # MinIO API port
      - "9001:9001" # MinIO Console/Browser UI port
    volumes:
      - ./minio/data:/data # Persist object data

# ΑΠΑΡΑΙΤΗΤΟ: Δήλωση των named volumes που χρησιμοποιούνται στο mytb
volumes:
  mytb-data:
  mytb-logs: